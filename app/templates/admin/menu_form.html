{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container py-5" style="max-width: 700px;">
    <h2 class="text-success mb-4">
        {% if item %}Edit{% else %}Add{% endif %} Menu Item 
        {% if place %}to {{ place.name }}{% endif %}
    </h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Item Name</label>
            <input type="text" name="name" class="form-control" 
                   value="{{ item.name if item else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Price (TTD)</label>
            <input type="number" step="0.01" name="price" class="form-control" 
                   value="{{ item.price if item else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ item.description if item else '' }}</textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Available?</label>
            <select name="is_available" class="form-select">
                <option value="true" {{ 'selected' if (item and item.is_available) or not item else '' }}>Yes</option>
                <option value="false" {{ 'selected' if item and not item.is_available else '' }}>No</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success btn-lg">
            {% if item %}Update Item{% else %}Add to Menu{% endif %}
        </button>
    </form>
</div>
{% endblock %}
