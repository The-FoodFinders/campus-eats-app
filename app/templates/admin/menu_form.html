{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container py-5" style="max-width: 700px;">
    <h2 class="text-success mb-4">Add Menu Item to {{ place.name }}</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Item Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Price (TTD)</label>
            <input type="number" step="0.01" name="price" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Available?</label>
            <select name="is_available" class="form-select">
                <option value="true" selected>Yes</option>
                <option value="false">No</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success btn-lg">Add to Menu</button>
    </form>
</div>
{% endblock %}
