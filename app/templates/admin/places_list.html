{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">Manage Food Places</h2>
        <a href="{{ url_for('admin_place_new_form') }}" class="btn btn-success">+ Add New Place</a>
    </div>

    <div class="row g-4">
        {% for place in places %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ place.name }}</h5>
                    <p class="text-muted">{{ place.location }}</p>
                    <p class="small">{{ place.description|truncate(100) }}</p>
                </div>
                <div class="card-footer bg-white border-0">
                    <a href="{{ url_for('admin_menu_list', place_id=place.id) }}" 
                       class="btn btn-sm btn-success">Manage Menu</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
