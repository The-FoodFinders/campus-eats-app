{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container py-5" style="max-width: 700px;">
    <h2 class="text-success mb-4">Add New Food Place</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Latitude</label>
                <input type="number" step="0.000001" name="latitude" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Longitude</label>
                <input type="number" step="0.000001" name="longitude" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-success btn-lg">Create Place</button>
    </form>
</div>
{% endblock %}
