{% extends "authenticated-base.html" %}

{% block subpage_content %}
<div class="container py-5" style="max-width: 700px;">
    <h2 class="text-success mb-4">
        {% if place %}Edit{% else %}Add New{% endif %} Food Place
    </h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" 
                   value="{{ place.name if place else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" 
                   value="{{ place.location if place else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ place.description if place else '' }}</textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Latitude</label>
                <input type="number" step="0.000001" name="latitude" class="form-control" 
                       value="{{ place.latitude if place else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Longitude</label>
                <input type="number" step="0.000001" name="longitude" class="form-control" 
                       value="{{ place.longitude if place else '' }}" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone Number (optional)</label>
            <input type="text" name="phone" class="form-control" 
                   value="{{ place.phone if place else '' }}">
        </div>
        <button type="submit" class="btn btn-success btn-lg">
            {% if place %}Update Place{% else %}Create Place{% endif %}
        </button>
    </form>
</div>
{% endblock %}
